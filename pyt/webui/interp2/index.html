<!DOCTYPE html<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Data Interpolation Tool</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script src="interpolate.js"></script>
</head>
<body>

<h1>Data Interpolation Tool</h1>
<p class="hint">Paste directly from Excel (select a range, copy, click a cell here, paste), or type values manually. First column is X, each other column is a Y series.</p>

<table id="grid">
  <thead>
    <tr id="headerRow">
      <th>X</th>
      <th>
        <input class="header-input" value="Series 1">
      </th>
      <th class="add-col-cell">
        <button id="addColBtn" title="Add series">+ Col</button>
      </th>
    </tr>
  </thead>
  <tbody id="gridBody">
  </tbody>
</table>

<div class="grid-controls">
  <button id="addRowBtn">+ Add row</button>
</div>

<div class="controls-row">
  <div class="field">
    <label for="newXStart">New X start</label>
    <input id="newXStart" type="text" placeholder="e.g. 1">
  </div>
  <div class="field">
    <label for="newXFinish">New X finish</label>
    <input id="newXFinish" type="text" placeholder="e.g. 5">
  </div>
  <div class="field">
    <label for="newXInterval">New X interval</label>
    <input id="newXInterval" type="text" placeholder="e.g. 0.1">
  </div>
  <div class="field">
    <label for="methodSelect">Method</label>
    <select id="methodSelect">
      <option value="linear">linear</option>
      <option value="quadratic">quadratic</option>
      <option value="cubic" selected>cubic</option>
      <option value="nearest">nearest</option>
    </select>
  </div>
  <div class="field">
    <button class="run-btn" id="runBtn">Run Interpolation</button>
  </div>
  <div class="field">
    <label style="display:flex; align-items:center; gap:6px; cursor:pointer;">
      <input type="checkbox" id="clientSideToggle" style="width:auto;">
      Compute in browser (TypeScript) — no server
    </label>
  </div>
</div>

<div id="errorBanner"></div>

<div id="chartWrap">
  <canvas id="chart" height="90"></canvas>
</div>

<script src="us.js"></script>

</body>
</html>
