<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Data Interpolation Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script id="interp-engine">
"use strict";
var Interp;
(function (Interp) {
    const MIN_POINTS_REQUIRED = {
        linear: 2,
        quadratic: 3,
        cubic: 4,
        nearest: 1,
    };
    function run(req) {
        const errors = [];
        const x = req.x.slice();
        if (x.length < 2) {
            return { error: "X must have at least 2 values." };
        }
        if (new Set(x).size !== x.length) {
            return { error: "X values must be unique (no duplicates)." };
        }
        if (!req.y_series || req.y_series.length === 0) {
            return { error: "At least one Y series is required." };
        }
        req.y_series.forEach((s) => {
            if (s.y.length !== x.length) {
                errors.push(`Series '${s.label}' has ${s.y.length} values, expected ${x.length} (same as X).`);
            }
        });
        if (errors.length > 0) {
            return { error: "Length mismatch:\n- " + errors.join("\n- ") };
        }
        const method = req.method;
        if (!(method in MIN_POINTS_REQUIRED)) {
            return { error: `Unknown method '${method}'.` };
        }
        const required = MIN_POINTS_REQUIRED[method];
        if (x.length < required) {
            return {
                error: `'${method}' interpolation needs at least ${required} X points, got ${x.length}.`,
            };
        }
        if (!(req.new_x_interval > 0)) {
            return { error: "New X interval must be greater than 0." };
        }
        if (!(req.new_x_start < req.new_x_finish)) {
            return { error: "New X start must be less than New X finish." };
        }
        const xMin = Math.min(...x);
        const xMax = Math.max(...x);
        if (req.new_x_start < xMin || req.new_x_finish > xMax) {
            return {
                error: `New X range [${req.new_x_start}, ${req.new_x_finish}] must be within ` +
                    `the original X range [${xMin}, ${xMax}]. Extrapolation is not allowed.`,
            };
        }
        const order = x.map((_, i) => i).sort((a, b) => x[a] - x[b]);
        const xSorted = order.map((i) => x[i]);
        const xNew = buildRange(req.new_x_start, req.new_x_finish, req.new_x_interval);
        const series = req.y_series.map((s) => {
            const ySorted = order.map((i) => s.y[i]);
            const yInterp = interpolateSeries(xSorted, ySorted, xNew, method);
            return { label: s.label, y_original: ySorted, y_interp: yInterp };
        });
        return { x_original: xSorted, x_new: xNew, series };
    }
    Interp.run = run;
    function buildRange(start, finish, interval) {
        const out = [];
        const n = Math.floor((finish - start) / interval + 1e-9);
        for (let i = 0; i <= n; i++) {
            out.push(start + i * interval);
        }
        if (out.length === 0 || out[out.length - 1] < finish - 1e-9) {
            out.push(finish);
        }
        out[out.length - 1] = finish;
        return out;
    }
    function interpolateSeries(xs, ys, xq, method) {
        switch (method) {
            case "linear":
                return xq.map((q) => linearAt(xs, ys, q));
            case "nearest":
                return xq.map((q) => nearestAt(xs, ys, q));
            case "quadratic":
                return quadraticSplineEval(xs, ys, xq);
            case "cubic":
                return naturalCubicSplineEval(xs, ys, xq);
        }
    }
    function findSegment(xs, q) {
        let i = 0;
        while (i < xs.length - 2 && q > xs[i + 1])
            i++;
        return i;
    }
    function linearAt(xs, ys, q) {
        const i = findSegment(xs, q);
        const t = (q - xs[i]) / (xs[i + 1] - xs[i]);
        return ys[i] + t * (ys[i + 1] - ys[i]);
    }
    function nearestAt(xs, ys, q) {
        let bestIdx = 0;
        let bestDist = Infinity;
        for (let i = 0; i < xs.length; i++) {
            const d = Math.abs(xs[i] - q);
            if (d < bestDist) {
                bestDist = d;
                bestIdx = i;
            }
        }
        return ys[bestIdx];
    }
    function naturalCubicSplineCoeffs(xs, ys) {
        const n = xs.length;
        const h = [];
        for (let i = 0; i < n - 1; i++)
            h.push(xs[i + 1] - xs[i]);
        const alpha = new Array(n).fill(0);
        for (let i = 1; i < n - 1; i++) {
            alpha[i] =
                (3 / h[i]) * (ys[i + 1] - ys[i]) - (3 / h[i - 1]) * (ys[i] - ys[i - 1]);
        }
        const l = new Array(n).fill(0);
        const mu = new Array(n).fill(0);
        const z = new Array(n).fill(0);
        l[0] = 1;
        for (let i = 1; i < n - 1; i++) {
            l[i] = 2 * (xs[i + 1] - xs[i - 1]) - h[i - 1] * mu[i - 1];
            mu[i] = h[i] / l[i];
            z[i] = (alpha[i] - h[i - 1] * z[i - 1]) / l[i];
        }
        l[n - 1] = 1;
        z[n - 1] = 0;
        const c = new Array(n).fill(0);
        const b = new Array(n - 1).fill(0);
        const d = new Array(n - 1).fill(0);
        const a = ys.slice(0, n - 1);
        for (let j = n - 2; j >= 0; j--) {
            c[j] = z[j] - mu[j] * c[j + 1];
            b[j] = (ys[j + 1] - ys[j]) / h[j] - (h[j] * (c[j + 1] + 2 * c[j])) / 3;
            d[j] = (c[j + 1] - c[j]) / (3 * h[j]);
        }
        return { a, b, c, d };
    }
    function naturalCubicSplineEval(xs, ys, xq) {
        const { a, b, c, d } = naturalCubicSplineCoeffs(xs, ys);
        return xq.map((q) => {
            const i = findSegment(xs, q);
            const dx = q - xs[i];
            return a[i] + b[i] * dx + c[i] * dx * dx + d[i] * dx * dx * dx;
        });
    }
    function quadraticSplineCoeffs(xs, ys) {
        const n = xs.length;
        const a = ys.slice(0, n - 1);
        const b = new Array(n - 1).fill(0);
        const c = new Array(n - 1).fill(0);
        let z = (ys[1] - ys[0]) / (xs[1] - xs[0]);
        for (let i = 0; i < n - 1; i++) {
            const h = xs[i + 1] - xs[i];
            const ci = (ys[i + 1] - ys[i] - z * h) / (h * h);
            b[i] = z;
            c[i] = ci;
            z = z + 2 * ci * h;
        }
        return { a, b, c };
    }
    function quadraticSplineEval(xs, ys, xq) {
        const { a, b, c } = quadraticSplineCoeffs(xs, ys);
        return xq.map((q) => {
            const i = findSegment(xs, q);
            const dx = q - xs[i];
            return a[i] + b[i] * dx + c[i] * dx * dx;
        });
    }
})(Interp || (Interp = {}));
</script>
<style>
  body {
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    max-width: 960px;
    margin: 30px auto;
    padding: 0 16px;
    color: #222;
  }
  h1 { font-size: 22px; }
  p.hint { color: #666; font-size: 14px; margin-top: -8px; }

  table#grid {
    border-collapse: collapse;
    margin-top: 12px;
  }
  table#grid th, table#grid td {
    border: 1px solid #ccc;
    padding: 0;
  }
  table#grid th {
    background: #f4f4f4;
    padding: 4px;
    text-align: center;
    position: relative;
  }
  table#grid input {
    width: 90px;
    height: 26px;
    border: none;
    text-align: center;
    font-size: 14px;
    outline: none;
  }
  table#grid input.header-input {
    width: 90px;
    font-weight: 600;
    background: transparent;
  }
  table#grid input.invalid {
    background: #ffdddd;
  }
  .col-remove, .row-remove {
    cursor: pointer;
    color: #a33;
    font-size: 12px;
    margin-left: 4px;
    user-select: none;
  }
  .grid-controls {
    margin-top: 8px;
    display: flex;
    gap: 8px;
  }
  .grid-controls button, .run-btn {
    padding: 6px 12px;
    border: 1px solid #999;
    background: #fafafa;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
  }
  .grid-controls button:hover, .run-btn:hover {
    background: #eee;
  }
  .controls-row {
    margin-top: 20px;
    display: flex;
    gap: 20px;
    align-items: flex-end;
    flex-wrap: wrap;
  }
  .field label {
    display: block;
    font-size: 13px;
    color: #444;
    margin-bottom: 4px;
  }
  .field input, .field select {
    padding: 5px 8px;
    font-size: 14px;
    border: 1px solid #bbb;
    border-radius: 4px;
  }
  .run-btn {
    background: #2b6cb0;
    color: white;
    border: none;
    font-weight: 600;
    padding: 8px 18px;
  }
  .run-btn:hover { background: #1e4e8c; }

  #errorBanner {
    display: none;
    margin-top: 16px;
    padding: 10px 14px;
    background: #fdecea;
    border: 1px solid #f5c2c0;
    color: #9c2f2a;
    border-radius: 4px;
    white-space: pre-wrap;
    font-size: 14px;
  }
  #chartWrap {
    margin-top: 30px;
  }
</style>
</head>
<body>

<h1>Data Interpolation Tool</h1>
<p class="hint">Paste directly from Excel (select a range, copy, click a cell here, paste), or type values manually. First column is X, each other column is a Y series.</p>

<table id="grid">
  <thead>
    <tr id="headerRow">
      <th>X</th>
      <th>
        <input class="header-input" value="Series 1">
      </th>
      <th class="add-col-cell">
        <button id="addColBtn" title="Add series">+ Col</button>
      </th>
    </tr>
  </thead>
  <tbody id="gridBody">
  </tbody>
</table>

<div class="grid-controls">
  <button id="addRowBtn">+ Add row</button>
</div>

<div class="controls-row">
  <div class="field">
    <label for="newXStart">New X start</label>
    <input id="newXStart" type="text" placeholder="e.g. 1">
  </div>
  <div class="field">
    <label for="newXFinish">New X finish</label>
    <input id="newXFinish" type="text" placeholder="e.g. 5">
  </div>
  <div class="field">
    <label for="newXInterval">New X interval</label>
    <input id="newXInterval" type="text" placeholder="e.g. 0.1">
  </div>
  <div class="field">
    <label for="methodSelect">Method</label>
    <select id="methodSelect">
      <option value="linear">linear</option>
      <option value="quadratic">quadratic</option>
      <option value="cubic" selected>cubic</option>
      <option value="nearest">nearest</option>
    </select>
  </div>
  <div class="field">
    <button class="run-btn" id="runBtn">Run Interpolation</button>
  </div>
  <div class="field">
    <label style="display:flex; align-items:center; gap:6px; cursor:pointer;">
      <input type="checkbox" id="clientSideToggle" style="width:auto;">
      Compute in browser (TypeScript) — no server
    </label>
  </div>
</div>

<div id="errorBanner"></div>

<div id="chartWrap">
  <canvas id="chart" height="90"></canvas>
</div>

<script>
const gridBody = document.getElementById('gridBody');
const headerRow = document.getElementById('headerRow');
const addColBtn = document.getElementById('addColBtn');
const addRowBtn = document.getElementById('addRowBtn');
const errorBanner = document.getElementById('errorBanner');
let chartInstance = null;

// ---------- Grid construction ----------

function numCols() {
  // columns = header cells minus the X column and the "add col" button cell
  return headerRow.querySelectorAll('th.series-header').length;
}

function makeCell(value) {
  const td = document.createElement('td');
  const input = document.createElement('input');
  input.type = 'text';
  input.value = value !== undefined ? value : '';
  input.addEventListener('blur', () => validateCell(input));
  input.addEventListener('paste', onPaste);
  td.appendChild(input);
  return td;
}

function addRow(values) {
  const tr = document.createElement('tr');
  const cols = numCols() + 1; // +1 for X column
  for (let c = 0; c < cols; c++) {
    tr.appendChild(makeCell(values ? values[c] : ''));
  }
  const removeTd = document.createElement('td');
  removeTd.style.border = 'none';
  const removeSpan = document.createElement('span');
  removeSpan.className = 'row-remove';
  removeSpan.textContent = '\u2715';
  removeSpan.title = 'Remove row';
  removeSpan.addEventListener('click', () => {
    if (gridBody.rows.length > 2) tr.remove();
  });
  removeTd.appendChild(removeSpan);
  tr.appendChild(removeTd);
  gridBody.appendChild(tr);
}

function addColumn(label) {
  const th = document.createElement('th');
  th.className = 'series-header';
  const input = document.createElement('input');
  input.className = 'header-input';
  input.value = label || `Series ${numCols() + 1}`;
  th.appendChild(input);

  const removeSpan = document.createElement('span');
  removeSpan.className = 'col-remove';
  removeSpan.textContent = '\u2715';
  removeSpan.title = 'Remove series';
  const colIndex = numCols() + 1; // 1-based index within row (0 = X)
  removeSpan.addEventListener('click', () => {
    if (numCols() > 1) removeColumn(th);
  });
  th.appendChild(removeSpan);

  headerRow.insertBefore(th, headerRow.querySelector('.add-col-cell'));

  // add matching empty cell to every existing row (before the remove-row cell)
  Array.from(gridBody.rows).forEach(row => {
    const cell = makeCell('');
    row.insertBefore(cell, row.lastElementChild);
  });
}

function removeColumn(th) {
  const idx = Array.from(headerRow.children).indexOf(th);
  th.remove();
  Array.from(gridBody.rows).forEach(row => {
    row.children[idx].remove();
  });
}

// initial: attach remove-listener to the first header's remove icon (none yet, add it)
function initHeader() {
  const firstHeader = headerRow.querySelector('th:not(.add-col-cell)');
  firstHeader.classList.add('series-header');
  // add remove icon to the initial series header too
  const removeSpan = document.createElement('span');
  removeSpan.className = 'col-remove';
  removeSpan.textContent = '\u2715';
  removeSpan.title = 'Remove series';
  removeSpan.addEventListener('click', () => {
    if (numCols() > 1) removeColumn(firstHeader);
  });
  firstHeader.appendChild(removeSpan);
}

addColBtn.addEventListener('click', () => addColumn());
addRowBtn.addEventListener('click', () => addRow());

// ---------- Validation ----------

function validateCell(input) {
  const v = input.value.trim();
  if (v === '') {
    input.classList.remove('invalid');
    return;
  }
  if (isNaN(Number(v))) {
    input.classList.add('invalid');
  } else {
    input.classList.remove('invalid');
  }
}

// ---------- Paste handling ----------

function getCellPosition(input) {
  const td = input.closest('td');
  const tr = td.closest('tr');
  const rowIndex = Array.from(gridBody.rows).indexOf(tr);
  const colIndex = Array.from(tr.children).indexOf(td);
  return { rowIndex, colIndex };
}

function ensureRows(count) {
  while (gridBody.rows.length < count) addRow();
}

function ensureCols(count) {
  // count = total data columns needed (including X at index 0)
  while (numCols() + 1 < count) addColumn();
}

function onPaste(e) {
  const text = (e.clipboardData || window.clipboardData).getData('text');
  if (!text || text.indexOf('\t') === -1 && text.indexOf('\n') === -1) {
    // single value paste, let default behavior happen
    return;
  }
  e.preventDefault();

  const input = e.target;
  const { rowIndex, colIndex } = getCellPosition(input);

  const rows = text.replace(/\r/g, '').split('\n').filter((r, i, arr) => !(i === arr.length - 1 && r === ''));
  const grid = rows.map(r => r.split('\t'));

  const neededRows = rowIndex + grid.length;
  const neededCols = colIndex + Math.max(...grid.map(r => r.length));

  ensureRows(neededRows);
  ensureCols(neededCols);

  for (let r = 0; r < grid.length; r++) {
    const tr = gridBody.rows[rowIndex + r];
    for (let c = 0; c < grid[r].length; c++) {
      const td = tr.children[colIndex + c];
      const cellInput = td.querySelector('input');
      cellInput.value = grid[r][c].trim();
      validateCell(cellInput);
    }
  }
}

// ---------- Data collection ----------

function collectData() {
  const numDataCols = numCols() + 1; // including X
  const rows = Array.from(gridBody.rows).map(tr =>
    Array.from(tr.children).slice(0, numDataCols).map(td => td.querySelector('input').value.trim())
  );

  // keep only rows where X is non-empty
  const usableRows = rows.filter(r => r[0] !== '');

  const xValues = [];
  const seriesRaw = [];
  for (let c = 1; c < numDataCols; c++) seriesRaw.push([]);

  usableRows.forEach(r => {
    xValues.push(r[0]);
    for (let c = 1; c < numDataCols; c++) {
      seriesRaw[c - 1].push(r[c]);
    }
  });

  const labels = Array.from(headerRow.querySelectorAll('th.series-header input')).map(i => i.value.trim() || 'Series');

  const errors = [];

  // numeric check for X
  const xNums = xValues.map(Number);
  if (xValues.some(v => v === '' || isNaN(Number(v)))) {
    errors.push('X column contains empty or non-numeric values.');
  }

  const seriesResult = [];
  seriesRaw.forEach((col, idx) => {
    const label = labels[idx] || `Series ${idx + 1}`;
    const filled = col.filter(v => v !== '').length;

    if (filled === 0) {
      errors.push(`Series '${label}' has no values.`);
      return;
    }
    if (filled < col.length && col.some((v, i) => v === '' )) {
      // check for gaps vs simple shortness
      const firstEmpty = col.indexOf('');
      const hasGapAfter = col.slice(firstEmpty).some(v => v !== '');
      if (hasGapAfter) {
        errors.push(`Series '${label}' is missing a value in the middle of the range — every X needs a matching Y.`);
      } else {
        errors.push(`Series '${label}' has ${filled} values but X has ${col.length} — missing values at the end.`);
      }
      return;
    }

    const nums = col.map(Number);
    if (nums.some(isNaN)) {
      errors.push(`Series '${label}' contains non-numeric values.`);
      return;
    }

    seriesResult.push({ label, y: nums });
  });

  return { xNums, seriesResult, errors };
}

// ---------- Submit ----------

function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.style.display = 'block';
}

function clearError() {
  errorBanner.style.display = 'none';
  errorBanner.textContent = '';
}

document.getElementById('runBtn').addEventListener('click', async () => {
  clearError();

  const { xNums, seriesResult, errors } = collectData();

  const newXStart = document.getElementById('newXStart').value.trim();
  const newXFinish = document.getElementById('newXFinish').value.trim();
  const newXInterval = document.getElementById('newXInterval').value.trim();
  const method = document.getElementById('methodSelect').value;

  if (xNums.length < 2) errors.push('X must have at least 2 values.');
  if ([newXStart, newXFinish, newXInterval].some(v => v === '' || isNaN(Number(v)))) {
    errors.push('New X start/finish/interval must all be filled with numeric values.');
  }

  if (errors.length > 0) {
    showError('Please fix the following:\n- ' + errors.join('\n- '));
    return;
  }

  const payload = {
    x: xNums,
    y_series: seriesResult,
    method,
    new_x_start: Number(newXStart),
    new_x_finish: Number(newXFinish),
    new_x_interval: Number(newXInterval),
  };

  const useClientSide = document.getElementById('clientSideToggle').checked;

  if (useClientSide) {
    // Pure TypeScript/JS engine, no network call at all.
    if (typeof Interp === 'undefined') {
      showError('Client-side engine failed to initialize (inline script error).');
      return;
    }
    const result = Interp.run(payload);
    if (result.error) {
      showError(result.error);
      return;
    }
    renderChart(result);
    return;
  }

  try {
    const resp = await fetch('/interpolate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    const contentType = resp.headers.get('content-type') || '';
    if (!contentType.includes('application/json')) {
      const text = await resp.text();
      showError(
        `Server returned an unexpected (non-JSON) response, HTTP ${resp.status}.\n` +
        `First 200 chars of response:\n${text.slice(0, 200)}`
      );
      return;
    }

    const data = await resp.json();

    if (!resp.ok) {
      showError(data.error || `Request failed with HTTP ${resp.status}.`);
      return;
    }

    renderChart(data);
  } catch (err) {
    showError('Request failed: ' + err.message);
  }
});

// ---------- Chart rendering ----------

function renderChart(data) {
  const ctx = document.getElementById('chart').getContext('2d');
  const colors = ['#2b6cb0', '#c0392b', '#27823f', '#8e44ad', '#d68910', '#16a085'];

  const datasets = [];
  data.series.forEach((s, i) => {
    const color = colors[i % colors.length];

    datasets.push({
      type: 'scatter',
      label: s.label + ' (original)',
      data: data.x_original.map((x, j) => ({ x, y: s.y_original[j] })),
      backgroundColor: color,
      pointRadius: 5,
      showLine: false,
    });

    datasets.push({
      type: 'line',
      label: s.label + ' (interpolated)',
      data: data.x_new.map((x, j) => ({ x, y: s.y_interp[j] })),
      borderColor: color,
      backgroundColor: 'transparent',
      pointRadius: 0,
      borderWidth: 2,
      tension: 0,
    });
  });

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'scatter',
    data: { datasets },
    options: {
      responsive: true,
      scales: {
        x: { type: 'linear', title: { display: true, text: 'X' } },
        y: { title: { display: true, text: 'Y' } },
      },
      plugins: {
        legend: { position: 'top' },
      },
    },
  });
}

// ---------- Init ----------

initHeader();
addRow(['1', '2']);
addRow(['2', '4']);
addRow(['3', '6']);
addRow(['4', '8']);
addRow(['5', '10']);
document.getElementById('newXStart').value = '1';
document.getElementById('newXFinish').value = '5';
document.getElementById('newXInterval').value = '0.1';
</script>

</body>
</html>
