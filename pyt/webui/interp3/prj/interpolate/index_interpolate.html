<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grid Data Entry</title>
<link rel="stylesheet" href="../../dev_basic/style.css">
</head>
<body>

<div id="app">

  <header class="app-header">
    <h1>Interpolate Calculator</h1>
  </header>

  <div class="app-toolbar">
    <button id="plotBtn" class="primary-btn">interpolate</button>
    <span class="status" id="status"></span>
    <span class="manual-range-controls">
	    <input type="number" id="outputXMin" placeholder="min" step="any">
	    <input type="number" id="outputXMax" placeholder="max" step="any">
	    <input type="number" id="outputXInterval" placeholder="interval" step="any">
	    <button id="genRangeBtn" class="primary-btn">generate range</button>
    </span>
  </div>

  <div class="app-main">
    <section class="panel panel-grid" style="flex: 1;">
      <h2>Input</h2>
      <div id="gridContainer" class="panel-body"></div>
    </section>
    <section class="panel panel-grid" style="flex: 1;">
      <h2>Output</h2>
      <div id="gridContainer_2" class="panel-body"></div>
    </section>
    <section class="panel panel-chart">
      <h2>Results</h2>
      <div id="chartContainer" class="panel-body"></div>
    </section>
  </div>

</div>

<script src="/dev_basic/grid.js"></script>
<script src="/dev_basic/chart.js"></script>
<script src="/dev_basic/dual-chart.js"></script>
<script src="/prj/interpolate/interp_engine.js"></script>
<script src="/prj/interpolate/page.js"></script>

</body>
</html>
