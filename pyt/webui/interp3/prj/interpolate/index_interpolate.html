<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grid Data Entry</title>
<link rel="stylesheet" href="../../dev_basic/style.css">
</head>
<body>

<div id="app">

  <header class="app-header">
    <h1>Interpolate Calculator</h1>
  </header>

  <div class="app-toolbar">
    <button id="plotBtn" class="primary-btn">interpolate</button>
    <span class="status" id="status"></span>
  </div>

  <div class="app-main">
    <section class="panel panel-grid" style="flex: 1;">
      <h2>Input</h2>
      <div id="gridContainer" class="panel-body"></div>
    </section>
    <section class="panel panel-grid" style="flex: 1;">
      <h2>Output</h2>
      <div id="gridContainer_2" class="panel-body"></div>
    </section>
    <section class="panel panel-chart">
      <h2>Results</h2>
      <div id="chartContainer" class="panel-body"></div>
    </section>
  </div>

</div>

<script src="../../dev_basic/grid.js"></script>
<script src="../../dev_basic/chart.js"></script>
<script src="../../dev_basic/dual-chart.js"></script>
<script src="interp_engine.js"></script>
<script src="page.js"></script>
<script>
  const grid = new GridTable(document.getElementById('gridContainer'), {
    rows: 10,
    cols: 4,
    viewportHeight: '100%',
    viewportWidth: '100%',
    fixedColCount: true
  });

  const grid_2 = new GridTable(document.getElementById('gridContainer_2'), {
    rows: 10,
    cols: 4,
    viewportHeight: '100%',
    viewportWidth: '100%',
    fixedColCount: true,
    readOnly: false
  });

  const chart = new DualSeriesChart(document.getElementById('chartContainer'), {
    height: 'auto',
    xLabel: 'X (column A)',
    yLabel: 'Y',
    aspectRatio: 16 / 9
  });

  function plotBoth() {
	  const { inputMeta, outputMeta } = buildInputOutputMeta(grid.getData(), grid_2.getData(), {
		  labelA: 'Input',
		  labelB: 'Output'
	  });
	  chart.renderInputOutput(grid.getData(), grid_2.getData(), { inputMeta, outputMeta });
  }

  document.getElementById('plotBtn').addEventListener('click', interpolateAndPlot);
  grid.on('change', interpolateAndPlot);
  grid_2.on('change', plotBoth);
</script>

</body>
</html>
