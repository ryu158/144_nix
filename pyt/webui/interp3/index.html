<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grid Data Entry</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <header class="app-header">
    <h1>Grid Data Entry</h1>
  </header>

  <div class="app-toolbar">
    <button id="plotBtn" class="primary-btn">Plot chart</button>
    <span class="status" id="status"></span>
  </div>

  <div class="app-main">
    <section class="panel panel-grid">
      <div id="gridContainer" class="panel-body"></div>
    </section>
    <section class="panel panel-chart">
      <div id="chartContainer" class="panel-body"></div>
    </section>
  </div>

</div>

<script src="grid.js"></script>
<script src="chart.js"></script>
<script>
  const grid = new GridTable(document.getElementById('gridContainer'), {
    rows: 10,
    cols: 5,
    viewportHeight: '100%',
    viewportWidth: '100%'
  });

  const chart = new Chart(document.getElementById('chartContainer'), {
    height: '70%',
    xLabel: 'X (column A)',
    yLabel: 'Y'
  });

  const statusEl = document.getElementById('status');
  function updateStatus() {
    statusEl.textContent = `${grid.numRows} rows × ${grid.numCols} columns`;
  }
  updateStatus();
  grid.on('change', updateStatus);

  document.getElementById('plotBtn').addEventListener('click', () => {
    chart.render(grid.getData());
  });
</script>

</body>
</html>
