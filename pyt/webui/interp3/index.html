<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grid Data Entry</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Grid Data Entry</h1>
<p class="hint">
  Click a cell to select it, drag to select a range, Shift+Click/Arrow to extend.
  Ctrl/Cmd+C / V to copy/paste ranges (works with Excel and CSV). Drag header edges to resize.
  Right-click a row or column header to insert/delete.
</p>

<div id="gridContainer"></div>
<div class="status" id="status" style="margin-top:10px; font-size:12px; color:#6b7280;"></div>

<script src="grid.js"></script>
<script>
  const grid = new GridTable(document.getElementById('gridContainer'), {
    rows: 10,
    cols: 10,
    viewportHeight: 480
  });

  const statusEl = document.getElementById('status');
  function updateStatus() {
    statusEl.textContent = `${grid.numRows} rows × ${grid.numCols} columns`;
  }
  updateStatus();
  grid.on('change', updateStatus);
</script>

</body>
</html>
